<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech Platform - Educação e Agronegócio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --secondary: #3B82F6;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            
            /* Light Mode */
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --surface-hover: #F3F4F6;
            --text: #111827;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #111827;
            --surface: #1F2937;
            --surface-hover: #374151;
            --text: #F9FAFB;
            --text-secondary: #9CA3AF;
            --border: #374151;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px var(--shadow);
            transition: all 0.3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--text);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-name {
            font-weight: 500;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            opacity: 0.9;
        }

        .btn-logout svg {
            width: 16px;
            height: 16px;
        }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 73px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            padding: 0 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-title svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-secondary);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 0.25rem;
        }

        .nav-item:hover {
            background: var(--surface-hover);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }

        .welcome {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .welcome h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            opacity: 0.9;
            font-size: 1.125rem;
        }

        /* IA Cards Grid */
        .ia-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .ia-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .ia-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--card-color);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ia-card:hover::before {
            opacity: 1;
        }

        .ia-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px var(--shadow);
            border-color: var(--card-color);
        }

        .ia-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            background: var(--card-bg);
        }

        .ia-icon svg {
            width: 28px;
            height: 28px;
        }

        .ia-card h3 {
            margin-bottom: 0.5rem;
            font-size: 1.125rem;
            color: var(--text);
        }

        .ia-card p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
        }

        /* Chat Interface */
        .chat-container {
            display: none;
            background: var(--surface);
            border-radius: 12px;
            height: calc(100vh - 220px);
            flex-direction: column;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .chat-container.active {
            display: flex;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-back-btn {
            background: var(--surface-hover);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-back-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text);
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .chat-title h2 {
            font-size: 1.25rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            animation: slideIn 0.3s;
            line-height: 1.6;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ia {
            align-self: flex-start;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: var(--primary-dark);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
        }

        .loading {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
        }

        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .ia-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>

                icon: '<path d="M5.5 21c.8 0 1.5-.7 1.5-1.5 0-.8-.7-1.5-1.5-1.5S4 18.7 4 19.5c0 .8.7 1.5 1.5 1.5zm0-3c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5zM18.5 21c.8 0 1.5-.7 1.5-1.5 0-.8-.7-1.5-1.5-1.5s-1.5.7-1.5 1.5c0 .8.7 1.5 1.5 1.5zm0-3c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5zm-3-9.5L12 2 8.5 8.5 2 12l6.5 3.5L12 22l3.5-6.5L22 12l-6.5-3.5z"/>'
            },
            {
                tipo: 'FISICA',
                nome: 'Física',
                descricao: 'Mecânica, energia e movimento',
                color: '#F59E0B',
                bg: '#FEF3C7',
                icon: '<circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"/>'
            },
            {
                tipo: 'BIOLOGIA',
                nome: 'Biologia',
                descricao: 'Genética, ecologia e anatomia',
                color: '#10B981',
                bg: '#D1FAE5',
                icon: '<path d="M6.5 12c3.5-3.5 8.5-3.5 12 0M9 15c2-2 5-2 7 0"/><line x1="12" y1="20" x2="12" y2="14"/><path d="M10.5 17.5L8 20M13.5 17.5L16 20"/>'
            },
            {
                tipo: 'GEOGRAFIA',
                nome: 'Geografia',
                descricao: 'Geografia física e humana',
                color: '#06B6D4',
                bg: '#CFFAFE',
                icon: '<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'
            },
            {
                tipo: 'HISTORIA',
                nome: 'História',
                descricao: 'História do Brasil e mundial',
                color: '#EC4899',
                bg: '#FCE7F3',
                icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'
            },
            {
                tipo: 'CIENCIAS',
                nome: 'Ciências',
                descricao: 'Ciências naturais',
                color: '#14B8A6',
                bg: '#CCFBF1',
                icon: '<path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>'
            },
            {
                tipo: 'AGRO_IA',
                nome: 'Agro.IA',
                descricao: 'Consultor agrícola especializado',
                color: '#84CC16',
                bg: '#ECFCCB',
                icon: '<path d="M12 20v-6M6 20V10M18 20V4"/>'
            }
        ];

        // Initialize
        window.onload = function() {
            loadUser();
            loadTheme();
            renderIACards();
        };

        function loadUser() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login-new.html';
                return;
            }
            
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').textContent = currentUser.nomeCompleto || currentUser.username;
            document.getElementById('welcomeName').textContent = currentUser.nomeCompleto || currentUser.username;
            
            // Set avatar initial
            const initial = (currentUser.nomeCompleto || currentUser.username).charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = initial;

            // Show agro section if user is AGRICULTOR
            if (currentUser.tipo === 'AGRICULTOR') {
                document.getElementById('agroSection').style.display = 'block';
            }
        }

        function renderIACards() {
            const grid = document.getElementById('iaGrid');
            grid.innerHTML = '';

            let cardsToShow = iaCards.filter(card => {
                if (card.tipo === 'AGRO_IA') {
                    return currentUser && currentUser.tipo === 'AGRICULTOR';
                }
                return card.tipo !== 'AGRO_IA';
            });

            cardsToShow.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'ia-card';
                cardEl.style.setProperty('--card-color', card.color);
                cardEl.style.setProperty('--card-bg', card.bg);
                cardEl.onclick = () => openChat(card.tipo);
                
                cardEl.innerHTML = `
                    <div class="ia-icon" style="background: ${card.bg};">
                        <svg viewBox="0 0 24 24" fill="none" stroke="${card.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            ${card.icon}
                        </svg>
                    </div>
                    <h3>${card.nome}</h3>
                    <p>${card.descricao}</p>
                `;
                
                grid.appendChild(cardEl);
            });
        }

        function showHome() {
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('chatView').classList.remove('active');
            
            // Reset active nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector('.nav-item').classList.add('active');
        }

        async function openChat(tipoIA) {
            currentTipoIA = tipoIA;
            
            const card = iaCards.find(c => c.tipo === tipoIA);
            if (!card) return;

            // Update chat header
            document.getElementById('chatTitle').textContent = card.nome;
            document.getElementById('chatSubtitle').textContent = card.descricao;
            
            const iconEl = document.getElementById('chatIcon');
            iconEl.style.background = card.bg;
            iconEl.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="${card.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    ${card.icon}
                </svg>
            `;

            // Show chat view
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('chatView').classList.add('active');

            // Clear messages
            document.getElementById('chatMessages').innerHTML = '';

            // Create or load conversation
            await loadOrCreateConversation(tipoIA);
        }

        async function loadOrCreateConversation(tipoIA) {
            try {
                const token = localStorage.getItem('token');
                
                if (!token) {
                    window.location.href = 'login-new.html';
                    return;
                }
                
                // Create new conversation
                const response = await fetch(`${API_URL}/conversas`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        tipoIA: tipoIA,
                        titulo: `Chat com ${iaCards.find(c => c.tipo === tipoIA).nome}`
                    })
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login-new.html';
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Erro ao criar conversa:', errorText);
                    throw new Error('Erro ao criar conversa');
                }

                currentChat = await response.json();
                addMessage('ia', `Olá! Sou o tutor de ${iaCards.find(c => c.tipo === tipoIA).nome}. Como posso ajudar você hoje?`);

            } catch (error) {
                console.error('Erro:', error);
                addMessage('ia', 'Erro ao iniciar conversa. Verifique se o servidor está rodando.');
            }
        }

        function addMessage(type, content) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoading() {
            const messagesDiv = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ia loading';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(loadingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || !currentChat) return;

            // Add user message
            addMessage('user', message);
            input.value = '';

            // Show loading
            addLoading();

            try {
                const token = localStorage.getItem('token');
                
                if (!token) {
                    removeLoading();
                    addMessage('ia', 'Sessão expirada. Faça login novamente.');
                    return;
                }
                
                const response = await fetch(`${API_URL}/conversas/${currentChat.id}/mensagens`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        conteudo: message
                    })
                });

                removeLoading();

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    addMessage('ia', 'Sessão expirada. Faça login novamente.');
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Erro ao enviar mensagem:', errorText);
                    throw new Error('Erro ao enviar mensagem');
                }

                const data = await response.json();
                addMessage('ia', data.conteudo);

            } catch (error) {
                removeLoading();
                console.error('Erro:', error);
                addMessage('ia', 'Desculpe, ocorreu um erro ao processar sua mensagem. Por favor, tente novamente.');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login-new.html';
        }

        function showMercado() {
            window.location.href = 'mercado.html';
        }

        // Theme Toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
</body>
