<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaGreen - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="light"] {
            --bg-gradient-start: #059669;
            --bg-gradient-end: #10B981;
            --container-bg: #FFFFFF;
            --text-primary: #064E3B;
            --text-secondary: #047857;
            --border-color: #D1FAE5;
            --input-bg: #F0FDF4;
            --input-border: #A7F3D0;
            --input-focus: #059669;
            --btn-bg: #059669;
            --btn-hover: #047857;
            --btn-disabled: #9CA3AF;
            --error-bg: #FEE2E2;
            --error-text: #991B1B;
            --success-bg: #D1FAE5;
            --success-text: #065F46;
            --tab-active: #059669;
            --shadow: rgba(5, 150, 105, 0.2);
        }
        
        :root[data-theme="dark"] {
            --bg-gradient-start: #0F172A;
            --bg-gradient-end: #1E293B;
            --container-bg: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --border-color: #334155;
            --input-bg: #0F172A;
            --input-border: #475569;
            --input-focus: #10B981;
            --btn-bg: #10B981;
            --btn-hover: #059669;
            --btn-disabled: #4B5563;
            --error-bg: #7F1D1D;
            --error-text: #FEE2E2;
            --success-bg: #064E3B;
            --success-text: #D1FAE5;
            --tab-active: #10B981;
            --shadow: rgba(0, 0, 0, 0.5);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        /* Gradientes específicos para cada tema */
        [data-theme="light"] body {
            background: linear-gradient(135deg, #059669 0%, #10B981 50%, #34D399 100%);
        }
        
        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 1000;
            color: var(--tab-active);
            font-size: 1.3rem;
        }
        
        .theme-toggle:hover {
            transform: scale(1.15) rotate(20deg);
            border-color: var(--tab-active);
            box-shadow: 0 8px 20px var(--shadow);
        }
        
        .container {
            background: var(--container-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            transition: all 0.3s ease;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: var(--tab-active);
            font-size: 2rem;
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .tab.active {
            color: var(--tab-active);
            border-bottom-color: var(--tab-active);
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--input-border);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px var(--input-focus)33;
        }

        /* ── Seleção de tipo de usuário ── */
        .user-type-label {
            display: block;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .user-type-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 22px;
        }

        .type-card {
            border: 2px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: var(--input-bg);
        }

        .type-card:hover {
            border-color: var(--tab-active);
            transform: translateY(-2px);
        }

        .type-card.selected {
            border-color: var(--tab-active);
            background: var(--success-bg);
        }

        .type-card .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 6px;
        }

        .type-card .label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .type-card .sublabel {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Campos extras que aparecem/somem */
        .extra-fields {
            display: none;
        }
        .extra-fields.visible {
            display: block;
        }

        /* Badge de tipo de usuário (info) */
        .type-info {
            background: var(--success-bg);
            color: var(--success-text);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            margin-bottom: 18px;
            display: none;
        }
        .type-info.visible { display: block; }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }
        
        .btn:disabled {
            background: var(--btn-disabled);
            cursor: not-allowed;
            transform: none;
        }
        
        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .success {
            background: var(--success-bg);
            color: var(--success-text);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .link a {
            color: var(--tab-active);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }
        
        .link a:hover {
            opacity: 0.8;
        }
        
        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="container">
        <div class="logo">
            <h1>VitaGreen</h1>
            <p>Sistema Inteligente de Análise de Solo</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" id="tabLogin">Entrar</button>
            <button class="tab" id="tabRegister">Criar Conta</button>
        </div>
        
        <div id="message"></div>
        
        <!-- LOGIN -->
        <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" required minlength="6" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Entrar</button>
            
            <div class="link">
                <a href="/app">Continuar sem login</a>
            </div>
        </form>
        
        <!-- REGISTRO -->
        <form id="registerForm" class="form" onsubmit="handleRegister(event)">

            <!-- Seleção de perfil -->
            <span class="user-type-label">Quem é você?</span>
            <div class="user-type-cards">
                <div class="type-card selected" data-type="produtor" onclick="selectUserType('produtor')">
                    <span class="icon">🌾</span>
                    <div class="label">Produtor</div>
                    <div class="sublabel">Agricultor / Fazenda</div>
                </div>
                <div class="type-card" data-type="comprador" onclick="selectUserType('comprador')">
                    <span class="icon">🏪</span>
                    <div class="label">Comprador</div>
                    <div class="sublabel">Empresa / Comércio</div>
                </div>
                <div class="type-card" data-type="transportador" onclick="selectUserType('transportador')">
                    <span class="icon">🚛</span>
                    <div class="label">Transportador</div>
                    <div class="sublabel">Frete / Logística</div>
                </div>
            </div>

            <!-- Info sobre o perfil -->
            <div class="type-info" id="typeInfo"></div>

            <!-- Campos básicos -->
            <div class="form-group">
                <label id="labelName">Seu Nome Completo</label>
                <input type="text" id="registerName" required autocomplete="name" placeholder="Ex: João da Silva">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" required autocomplete="email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label>Telefone / WhatsApp <span style="font-weight:400;color:var(--text-secondary)">(opcional)</span></label>
                <input type="tel" id="registerPhone" autocomplete="tel" placeholder="(00) 90000-0000">
            </div>

            <!-- Campos do PRODUTOR -->
            <div class="extra-fields visible" id="fieldProdutor">
                <div class="form-group">
                    <label>Nome da Fazenda / Propriedade <span style="font-weight:400;color:var(--text-secondary)">(opcional)</span></label>
                    <input type="text" id="registerFarm" autocomplete="organization" placeholder="Ex: Sítio Boa Esperança">
                </div>
                <div class="form-group">
                    <label>Município</label>
                    <input type="text" id="registerCityP" placeholder="Ex: Santarém">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="registerStateP">
                        <option value="">Selecione...</option>
                        <optgroup label="Norte">
                            <option value="AC">Acre</option><option value="AM">Amazonas</option>
                            <option value="AP">Amapá</option><option value="PA">Pará</option>
                            <option value="RO">Rondônia</option><option value="RR">Roraima</option>
                            <option value="TO">Tocantins</option>
                        </optgroup>
                        <optgroup label="Nordeste">
                            <option value="AL">Alagoas</option><option value="BA">Bahia</option>
                            <option value="CE">Ceará</option><option value="MA">Maranhão</option>
                            <option value="PB">Paraíba</option><option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option><option value="RN">Rio Grande do Norte</option>
                            <option value="SE">Sergipe</option>
                        </optgroup>
                        <optgroup label="Centro-Oeste">
                            <option value="DF">Distrito Federal</option><option value="GO">Goiás</option>
                            <option value="MS">Mato Grosso do Sul</option><option value="MT">Mato Grosso</option>
                        </optgroup>
                        <optgroup label="Sudeste">
                            <option value="ES">Espírito Santo</option><option value="MG">Minas Gerais</option>
                            <option value="RJ">Rio de Janeiro</option><option value="SP">São Paulo</option>
                        </optgroup>
                        <optgroup label="Sul">
                            <option value="PR">Paraná</option><option value="RS">Rio Grande do Sul</option>
                            <option value="SC">Santa Catarina</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Campos do COMPRADOR -->
            <div class="extra-fields" id="fieldComprador">
                <div class="form-group">
                    <label>Nome da Empresa</label>
                    <input type="text" id="registerCompany" placeholder="Ex: Cooperativa Agrícola do Norte">
                </div>
                <div class="form-group">
                    <label>CNPJ</label>
                    <input type="text" id="registerCNPJ" placeholder="00.000.000/0000-00" maxlength="18"
                           oninput="formatCNPJ(this)" onblur="checkCNPJ(this)">
                    <small id="cnpjStatus" style="font-size:0.8rem;margin-top:4px;display:block"></small>
                </div>
                <div class="form-group">
                    <label>Município</label>
                    <input type="text" id="registerCityC" placeholder="Ex: Belém">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="registerStateC">
                        <option value="">Selecione...</option>
                        <optgroup label="Norte">
                            <option value="AC">Acre</option><option value="AM">Amazonas</option>
                            <option value="AP">Amapá</option><option value="PA">Pará</option>
                            <option value="RO">Rondônia</option><option value="RR">Roraima</option>
                            <option value="TO">Tocantins</option>
                        </optgroup>
                        <optgroup label="Nordeste">
                            <option value="AL">Alagoas</option><option value="BA">Bahia</option>
                            <option value="CE">Ceará</option><option value="MA">Maranhão</option>
                            <option value="PB">Paraíba</option><option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option><option value="RN">Rio Grande do Norte</option>
                            <option value="SE">Sergipe</option>
                        </optgroup>
                        <optgroup label="Centro-Oeste">
                            <option value="DF">Distrito Federal</option><option value="GO">Goiás</option>
                            <option value="MS">Mato Grosso do Sul</option><option value="MT">Mato Grosso</option>
                        </optgroup>
                        <optgroup label="Sudeste">
                            <option value="ES">Espírito Santo</option><option value="MG">Minas Gerais</option>
                            <option value="RJ">Rio de Janeiro</option><option value="SP">São Paulo</option>
                        </optgroup>
                        <optgroup label="Sul">
                            <option value="PR">Paraná</option><option value="RS">Rio Grande do Sul</option>
                            <option value="SC">Santa Catarina</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Campos do TRANSPORTADOR -->
            <div class="extra-fields" id="fieldTransportador">
                <div class="form-group">
                    <label>Tipo de Veículo</label>
                    <select id="registerVehicle">
                        <option value="">Selecione...</option>
                        <option value="moto">Moto / Scooter</option>
                        <option value="carro">Carro / Passeio</option>
                        <option value="pickup">Caminhonete / Pickup</option>
                        <option value="van">Van / Utilitário</option>
                        <option value="caminhao_pequeno">Caminhão Pequeno (até 3t)</option>
                        <option value="caminhao_medio">Caminhão Médio (3–10t)</option>
                        <option value="caminhao_grande">Caminhão Grande (acima 10t)</option>
                        <option value="trator">Trator / Máquina Agrícola</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Município Base</label>
                    <input type="text" id="registerCityT" placeholder="Ex: Marabá">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="registerStateT">
                        <option value="">Selecione...</option>
                        <optgroup label="Norte">
                            <option value="AC">Acre</option><option value="AM">Amazonas</option>
                            <option value="AP">Amapá</option><option value="PA">Pará</option>
                            <option value="RO">Rondônia</option><option value="RR">Roraima</option>
                            <option value="TO">Tocantins</option>
                        </optgroup>
                        <optgroup label="Nordeste">
                            <option value="AL">Alagoas</option><option value="BA">Bahia</option>
                            <option value="CE">Ceará</option><option value="MA">Maranhão</option>
                            <option value="PB">Paraíba</option><option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option><option value="RN">Rio Grande do Norte</option>
                            <option value="SE">Sergipe</option>
                        </optgroup>
                        <optgroup label="Centro-Oeste">
                            <option value="DF">Distrito Federal</option><option value="GO">Goiás</option>
                            <option value="MS">Mato Grosso do Sul</option><option value="MT">Mato Grosso</option>
                        </optgroup>
                        <optgroup label="Sudeste">
                            <option value="ES">Espírito Santo</option><option value="MG">Minas Gerais</option>
                            <option value="RJ">Rio de Janeiro</option><option value="SP">São Paulo</option>
                        </optgroup>
                        <optgroup label="Sul">
                            <option value="PR">Paraná</option><option value="RS">Rio Grande do Sul</option>
                            <option value="SC">Santa Catarina</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- Senha -->
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="registerPassword" required minlength="6"
                       autocomplete="new-password" placeholder="Mínimo 6 caracteres">
            </div>

            <input type="hidden" id="selectedUserType" value="produtor">

            <button type="submit" class="btn" id="registerBtn">Criar Conta</button>
        </form>
    </div>
    
    <script src="theme.js"></script>
    <script src="auth.js"></script>
</body>
</html>
